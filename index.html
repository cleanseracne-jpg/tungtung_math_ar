<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loggy Math AR (ศึกน้องล็อกกี้ ปาไม้ทายสูตรคูณ)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        .glass {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        /* ป้องกันกล้องกลับด้านซ้ายขวา */
        video {
            transform: scaleX(-1);
        }
        /* บังคับสัดส่วน 16:9 ให้เกมไม่บีบแบน */
        .game-container {
            aspect-ratio: 16 / 9;
            max-height: 100dvh;
            max-width: 100vw;
        }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans overflow-hidden select-none w-screen h-[100dvh] flex items-center justify-center">

    <video id="webcam" class="hidden" autoplay playsinline></video>

    <!-- หน้าแรก: เหลือแค่ปุ่มเข้าสู่เกม จัดตำแหน่งไปที่กรอบป้ายไม้ซ้ายล่าง -->
    <div id="start-screen" class="absolute inset-0 z-50 bg-cover bg-center bg-no-repeat" style="background-image: url('images/bg-start.png'); background-color: #f97316;">
        <div class="absolute w-[80%] md:w-[35%] max-w-md top-[75%] left-1/2 md:top-[70%] md:left-[23%] transform -translate-x-1/2 -translate-y-1/2 text-center">
            <button id="btn-start" class="w-full bg-gradient-to-r from-orange-400 to-amber-600 hover:from-orange-500 hover:to-amber-700 text-white font-black text-xl lg:text-2xl py-3 lg:py-4 rounded-full transition shadow-lg transform hover:scale-105 cursor-pointer border-4 border-amber-800 pointer-events-auto">
                เข้าสู่เกม (Start)
            </button>
        </div>
    </div>

    <!-- กล่องเกมหลัก -->
    <div class="relative w-full game-container max-w-6xl mx-auto bg-black rounded-none md:rounded-3xl overflow-hidden shadow-2xl border-0 md:border-4 border-slate-700">
        
        <canvas id="gameCanvas" class="absolute inset-0 w-full h-full z-20"></canvas>

        <!-- UI ชั้นทับ Canvas -->
        <div class="absolute inset-0 z-30 pointer-events-none flex flex-col justify-between p-2 sm:p-4">
            
            <!-- แถวบน: สถานะข้อ, คะแนน, และเวลา/ขยายจอ -->
            <div class="flex justify-between items-start">
                <div class="glass px-2 py-1 sm:px-4 sm:py-2 rounded-xl flex items-center space-x-2 sm:space-x-4">
                    <div class="text-center">
                        <div class="text-[8px] sm:text-[10px] text-yellow-200 uppercase font-bold">ข้อที่</div>
                        <div id="ui-question-number" class="text-sm sm:text-xl md:text-2xl font-black text-white">1 / 20</div>
                    </div>
                    <div class="h-6 sm:h-8 w-px bg-white/40"></div>
                    <div class="text-center">
                        <div class="text-[8px] sm:text-[10px] text-yellow-200 uppercase font-bold">คะแนน</div>
                        <div id="ui-score" class="text-sm sm:text-xl md:text-2xl font-black text-green-400">0</div>
                    </div>
                </div>

                <div class="flex space-x-2">
                    <div class="glass px-2 py-1 sm:px-4 sm:py-2 rounded-xl text-center">
                        <div class="text-[8px] sm:text-[10px] text-yellow-200 uppercase font-bold">เวลาที่เหลือ</div>
                        <div id="ui-timer" class="text-sm sm:text-xl md:text-2xl font-black text-pink-400">00:30</div>
                    </div>
                    <!-- ปุ่มขยายจอ -->
                    <button id="btn-fullscreen" class="glass px-2 py-1 sm:px-3 sm:py-2 rounded-xl flex items-center justify-center text-white pointer-events-auto hover:bg-white/20 transition cursor-pointer shadow-lg" title="เต็มหน้าจอ">
                        <svg class="w-4 h-4 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                    </button>
                </div>
            </div>

            <!-- แถวล่าง: ป้ายคำถาม ย้ายมาอยู่กลางล่าง -->
            <div class="flex justify-center mb-2 sm:mb-8">
                <div class="relative px-6 py-3 sm:px-12 sm:py-5 text-center min-w-[180px] sm:min-w-[280px] bg-contain bg-center bg-no-repeat drop-shadow-xl" style="background-image: url('images/ui-board.png');">
                    <div class="absolute inset-0 bg-black/30 rounded-xl sm:rounded-2xl -z-10" style="backdrop-filter: blur(2px);"></div>
                    <div id="ui-math-title" class="text-[10px] sm:text-xs text-yellow-300 font-bold mb-1 drop-shadow-md">แก๊งมอนสเตอร์บุก!</div>
                    <div id="ui-math-question" class="text-2xl sm:text-4xl font-black text-white drop-shadow-lg">⌛ โหลด...</div>
                </div>
            </div>
        </div>

        <div id="ai-loading-status" class="absolute bottom-2 left-2 z-30 glass px-2 py-1 sm:px-4 sm:py-2 rounded-lg sm:rounded-xl text-[10px] sm:text-xs flex items-center space-x-2 text-yellow-300 pointer-events-none">
            <span class="animate-ping inline-block w-1.5 h-1.5 sm:w-2 sm:h-2 rounded-full bg-yellow-400"></span>
            <span id="status-text" class="font-bold">ตรวจสอบระบบควบคุม...</span>
        </div>
    </div>

    <div id="game-over-screen" class="absolute inset-0 flex flex-col items-center justify-center z-50 bg-cover bg-center bg-no-repeat hidden">
        <div class="glass p-6 sm:p-10 rounded-3xl text-center max-w-[90%] sm:max-w-md shadow-2xl border-2 border-white/50 bg-black/70">
            <h2 id="summary-title" class="text-2xl sm:text-4xl font-black mb-2 text-yellow-400 drop-shadow-lg">...</h2>
            <p id="summary-sub" class="text-sm sm:text-lg text-white mb-6 font-bold">...</p>
            
            <div class="bg-white/10 p-4 sm:p-5 rounded-2xl mb-6 space-y-2 sm:space-y-3 border border-white/20">
                <div class="flex justify-between text-base sm:text-lg font-bold">
                    <span class="text-slate-200">คะแนนรวม:</span>
                    <span id="summary-score" class="text-green-400">0</span>
                </div>
                <div class="flex justify-between text-base sm:text-lg font-bold">
                    <span class="text-slate-200">เวลาที่ใช้ไป:</span>
                    <span id="summary-time" class="text-blue-300">00:00</span>
                </div>
            </div>

            <button id="btn-restart" class="w-full bg-cyan-500 hover:bg-cyan-400 text-white font-black text-lg sm:text-xl py-3 sm:py-4 rounded-xl sm:rounded-2xl transition shadow-[0_0_15px_rgba(6,182,212,0.8)] transform hover:scale-105 cursor-pointer pointer-events-auto">
                เล่นอีกครั้ง 🔄
            </button>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('gameCanvas');
        const ctx = canvasElement.getContext('2d');
        const uiQuestionNumber = document.getElementById('ui-question-number');
        const uiScore = document.getElementById('ui-score');
        const uiMathQuestion = document.getElementById('ui-math-question');
        const uiMathTitle = document.getElementById('ui-math-title');
        const uiTimer = document.getElementById('ui-timer');
        const statusText = document.getElementById('status-text');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const btnStart = document.getElementById('btn-start');
        const btnRestart = document.getElementById('btn-restart');
        const btnFullscreen = document.getElementById('btn-fullscreen');

        // โหลดรูปภาพ
        const images = {
            main: new Image(), stick: new Image(),
            target1: new Image(), target2: new Image(), target3: new Image(),
            correct: new Image(), wrong: new Image(),
            bgNormal: new Image(), bgBonus: new Image(),
            badge: new Image(), cursor: new Image()
        };
        images.main.src = 'images/tung-main.png';
        images.stick.src = 'images/stick.png';
        images.target1.src = 'images/tung-target-1.png';
        images.target2.src = 'images/tung-target-2.png';
        images.target3.src = 'images/tung-target-3.png';
        images.correct.src = 'images/effect-correct.png';
        images.wrong.src = 'images/effect-wrong.png';
        images.bgNormal.src = 'images/bg-normal.png';
        images.bgBonus.src = 'images/bg-bonus.png';
        images.badge.src = 'images/ui-badge.png';
        images.cursor.src = 'images/ui-cursor.png';

        // โหลดระบบเสียง
        const bgm = new Audio('sounds/bgm_thinking.mp3');
        bgm.loop = true; 
        bgm.volume = 0.3; // เบาดนตรีลงหน่อยเพื่อให้ได้ยินเสียงปาชัดๆ

        const sfxLock = new Audio('sounds/sfx_lock.mp3');
        const sfxThrow = new Audio('sounds/sfx_throw.mp3');
        const sfxCorrect = new Audio('sounds/sfx_correct.mp3');
        const sfxWrong = new Audio('sounds/sfx_wrong.mp3');
        const sfxVictory = new Audio('sounds/sfx_victory.mp3');
        const sfxGameOver = new Audio('sounds/sfx_gameover.mp3');

        // ฟังก์ชันช่วยเล่นเสียงเอฟเฟกต์ไม่ให้ซ้อนกันและแก้บั๊กเว็บบล็อกเสียง
        function playSFX(audioElement) {
            audioElement.currentTime = 0;
            audioElement.play().catch(e => console.log("รออนุญาตเล่นเสียง:", e));
        }

        let gameState = 'START'; 
        let score = 0;
        let currentQuestionIdx = 0;
        const totalQuestions = 20;
        let questionsList = [];
        let gameTimeLeft = 30; 
        let timerInterval = null;
        let totalTimeSpent = 0;
        let isBonusRound = false;

        let cursor = { x: 600, y: 337, isAiming: false, wasFist: false };
        let isHandDetected = false;
        let isWebcamActive = false; 

        // ปรับตำแหน่งทุงทุงลงมาด้านล่างสุดของจอ
        const tungBase = { x: 600, y: 560 }; 
        let stickObj = { x: 600, y: 560, r: 40, vx: 0, vy: 0, isFired: false, scale: 1, rotation: 0 };
        let targets = []; 
        let tungThrowAnimTimer = 0;

        function resizeCanvas() {
            canvasElement.width = 1200;
            canvasElement.height = 675; // 16:9 
        }
        resizeCanvas();

        function generateMathQuestions() {
            let list = [];
            let bonusIndices = new Set([4, 9, 14]);

            for (let i = 0; i < totalQuestions; i++) {
                const isBonus = bonusIndices.has(i);
                let num1, num2, answer;

                if (isBonus) {
                    num1 = Math.floor(Math.random() * 9000) + 100; 
                    num2 = Math.floor(Math.random() * 8) + 2; 
                } else {
                    num1 = Math.floor(Math.random() * 11) + 2; 
                    num2 = Math.floor(Math.random() * 12) + 1; 
                }
                
                answer = num1 * num2;
                let wrong1 = answer + (Math.random() > 0.5 ? num1 : -num1);
                let wrong2 = answer + (Math.random() > 0.5 ? 10 : -10);
                if (wrong1 === answer || wrong1 <= 0) wrong1 = answer + 7;
                if (wrong2 === answer || wrong2 === wrong1 || wrong2 <= 0) wrong2 = answer + 12;

                let options = [
                    { value: answer, isCorrect: true },
                    { value: wrong1, isCorrect: false },
                    { value: wrong2, isCorrect: false }
                ].sort(() => Math.random() - 0.5);

                list.push({ text: `${num1} × ${num2} = ?`, options: options, isBonus: isBonus });
            }
            return list;
        }

        function resetStick() {
            stickObj.x = tungBase.x;
            stickObj.y = tungBase.y;
            stickObj.vx = 0; stickObj.vy = 0;
            stickObj.scale = 1; stickObj.rotation = 0;
            stickObj.isFired = false;
        }

        function loadQuestion(idx) {
            if (idx >= totalQuestions) { endGame(true); return; }
            currentQuestionIdx = idx;
            uiQuestionNumber.innerText = `${idx + 1} / ${totalQuestions}`;
            
            const qData = questionsList[idx];
            uiMathQuestion.innerText = qData.text;
            isBonusRound = qData.isBonus;
            gameTimeLeft = isBonusRound ? 90 : 30;
            
            if (isBonusRound) {
                uiMathTitle.innerText = "🔥 ด่านโบนัส! (300 คะแนน) 🔥";
                uiMathTitle.classList.replace('text-yellow-300', 'text-pink-400');
            } else {
                uiMathTitle.innerText = "แก๊งมอนสเตอร์บุก!";
                uiMathTitle.classList.replace('text-pink-400', 'text-yellow-300');
            }

            const positions = [ { x: 300, y: 160 }, { x: 600, y: 160 }, { x: 900, y: 160 } ];
            targets = qData.options.map((opt, i) => {
                let type = Math.floor(Math.random() * 3) + 1; 
                return {
                    x: positions[i].x, y: positions[i].y, r: 50,
                    val: opt.value, isCorrect: opt.isCorrect, isHit: false, type: type,
                    floatOffset: Math.random() * Math.PI * 2,
                    hitScale: 1.0, hitAlpha: 1.0
                };
            });
            resetStick();
        }

        // ควบคุมผ่านเมาส์ (กดค้าง = เล็ง, ปล่อย = ปา)
        canvasElement.addEventListener('mousedown', (e) => { 
            if (!isHandDetected) { 
                playSFX(sfxLock); // เสียงล็อกเป้า
                cursor.isAiming = true; cursor.wasFist = true; 
                const p = getMousePos(e); cursor.x=p.x; cursor.y=p.y; 
            }
        });
        canvasElement.addEventListener('mousemove', (e) => { 
            if (!isHandDetected) { 
                const p = getMousePos(e); cursor.x=p.x; cursor.y=p.y; 
            }
        });
        canvasElement.addEventListener('mouseup', (e) => { 
            if (!isHandDetected && cursor.wasFist) { 
                cursor.isAiming = false; cursor.wasFist = false; shootStick(cursor); 
            }
        });
        
        // ควบคุมผ่านทัชสกรีน
        canvasElement.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            if (!isHandDetected) { 
                playSFX(sfxLock); // เสียงล็อกเป้า
                cursor.isAiming = true; cursor.wasFist = true; 
                const p = getTouchPos(e); cursor.x=p.x; cursor.y=p.y; 
            }
        });
        canvasElement.addEventListener('touchmove', (e) => { 
            e.preventDefault(); 
            if (!isHandDetected) { 
                const p = getTouchPos(e); cursor.x=p.x; cursor.y=p.y; 
            }
        });
        canvasElement.addEventListener('touchend', (e) => { 
            e.preventDefault(); 
            if (!isHandDetected && cursor.wasFist) { 
                cursor.isAiming = false; cursor.wasFist = false; shootStick(cursor); 
            }
        });

        function getMousePos(e) { const r = canvasElement.getBoundingClientRect(); return { x: (e.clientX - r.left) / r.width * canvasElement.width, y: (e.clientY - r.top) / r.height * canvasElement.height }; }
        function getTouchPos(e) { const r = canvasElement.getBoundingClientRect(); return { x: (e.touches[0].clientX - r.left) / r.width * canvasElement.width, y: (e.touches[0].clientY - r.top) / r.height * canvasElement.height }; }

        function shootStick(pos) {
            if (!stickObj.isFired && gameState === 'PLAYING') {
                playSFX(sfxThrow); // เสียงปาไม้
                const dx = pos.x - tungBase.x;
                const dy = pos.y - tungBase.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist > 10) { 
                    const shootSpeed = 40; 
                    stickObj.vx = (dx / dist) * shootSpeed;
                    stickObj.vy = (dy / dist) * shootSpeed;
                    stickObj.isFired = true;
                    tungThrowAnimTimer = 15; 
                }
            }
        }

        function updatePhysics() {
            if (stickObj.isFired) {
                stickObj.x += stickObj.vx; 
                stickObj.y += stickObj.vy;
                stickObj.rotation += 0.4; 
                if (stickObj.scale > 0.2) stickObj.scale -= 0.02; 

                targets.forEach(target => {
                    if (!target.isHit) {
                        const dx = stickObj.x - target.x; const dy = stickObj.y - target.y;
                        if (Math.sqrt(dx*dx + dy*dy) < (stickObj.r * stickObj.scale) + target.r) {
                            target.isHit = true; handleTargetHit(target);
                        }
                    }
                });

                if (stickObj.y < -150 || stickObj.x > canvasElement.width + 150 || stickObj.x < -150 || stickObj.y > canvasElement.height + 150) {
                    resetStick(); // ดึงไม้กลับมาที่เดิมถ้าหลุดจอ
                }
            }
            if (tungThrowAnimTimer > 0) tungThrowAnimTimer--;
        }

        function handleTargetHit(target) {
            if (target.isCorrect) {
                playSFX(sfxCorrect); // เสียงถูกต้อง
                score += isBonusRound ? 300 : 100; 
                uiScore.innerText = score;
                setTimeout(() => { if (gameState === 'PLAYING') loadQuestion(currentQuestionIdx + 1); }, 1200);
            } else {
                playSFX(sfxWrong); // เสียงผิด
                score -= 100; 
                uiScore.innerText = score;
                // ปาผิดให้สร้างไม้กลับมาให้ปาใหม่ทันที
                setTimeout(() => { if (gameState === 'PLAYING' && !targets.some(t => t.isCorrect && t.isHit)) resetStick(); }, 100);
            }
        }
        setInterval(updatePhysics, 1000 / 60);

        function drawGame() {
            ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            const time = Date.now(); 

            if (isWebcamActive) {
                ctx.save(); ctx.translate(canvasElement.width, 0); ctx.scale(-1, 1);
                ctx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height); ctx.restore();
                ctx.fillStyle = isBonusRound ? 'rgba(88, 28, 135, 0.4)' : 'rgba(15, 23, 42, 0.2)';
                ctx.fillRect(0, 0, canvasElement.width, canvasElement.height);
            } else {
                try { ctx.drawImage(isBonusRound ? images.bgBonus : images.bgNormal, 0, 0, canvasElement.width, canvasElement.height); } catch(e) {}
            }

            if (gameState === 'PLAYING') {
                if (cursor.isAiming && !stickObj.isFired) {
                    ctx.beginPath(); ctx.moveTo(tungBase.x, tungBase.y); ctx.lineTo(cursor.x, cursor.y);
                    ctx.setLineDash([15, 10]); 
                    let lineGrad = ctx.createLinearGradient(tungBase.x, tungBase.y, cursor.x, cursor.y);
                    lineGrad.addColorStop(0, 'rgba(255, 255, 255, 0.2)'); 
                    lineGrad.addColorStop(1, 'rgba(255, 100, 100, 0.8)');
                    ctx.strokeStyle = lineGrad; ctx.lineWidth = 6; ctx.stroke(); ctx.setLineDash([]);
                }

                targets.forEach(target => {
                    const floatX = Math.cos((time * 0.002) + target.floatOffset) * 10;
                    const floatY = Math.sin((time * 0.003) + target.floatOffset) * 12;
                    const tx = target.x + floatX; const ty = target.y + floatY;

                    ctx.save();
                    ctx.translate(tx, ty);

                    if (target.isHit) {
                        target.hitScale += 0.025; 
                        target.hitAlpha -= 0.03; 
                        if (target.hitAlpha < 0) target.hitAlpha = 0;
                        ctx.globalAlpha = target.hitAlpha; ctx.scale(target.hitScale, target.hitScale);
                        try { ctx.drawImage(target.isCorrect ? images.correct : images.wrong, -target.r*2, -target.r*2, target.r*4, target.r*4); } catch(e) {}
                    } else {
                        let tImg = images.target1;
                        if (target.type === 2) tImg = images.target2;
                        if (target.type === 3) tImg = images.target3;
                        ctx.rotate(Math.sin((time * 0.002) + target.floatOffset) * 0.08);
                        try {
                            ctx.drawImage(tImg, -target.r*1.8, -target.r*1.8, target.r*3.6, target.r*3.6);
                            ctx.drawImage(images.badge, -50, -target.r - 45, 100, 50);
                            ctx.fillStyle = '#fff'; ctx.font = '900 24px Arial';
                            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                            ctx.fillText(target.val, 0, -target.r - 20);
                        } catch(e) {}
                    }
                    ctx.restore();
                });

                ctx.save();
                ctx.translate(tungBase.x, tungBase.y); 
                let scaleX = 1 + Math.sin(time * 0.003) * 0.02; 
                let scaleY = 1 + Math.cos(time * 0.003) * 0.03; 
                if (tungThrowAnimTimer > 0) { scaleY += 0.15; scaleX -= 0.1; }
                ctx.scale(scaleX, scaleY);
                try { ctx.drawImage(images.main, -120, -220, 240, 240); } catch(e) {}
                ctx.restore();

                if (stickObj.isFired || true) { 
                    ctx.save(); ctx.translate(stickObj.x, stickObj.y); ctx.rotate(stickObj.rotation);
                    try {
                        const sSize = stickObj.r * 2.5 * stickObj.scale;
                        ctx.drawImage(images.stick, -sSize/2, -sSize/2, sSize, sSize);
                    } catch(e) {}
                    ctx.restore();
                }

                if (isHandDetected || !isHandDetected) { 
                    try {
                        ctx.globalAlpha = cursor.isAiming ? 1.0 : 0.6;
                        ctx.drawImage(images.cursor, cursor.x - 25, cursor.y - 25, 50, 50);
                        if (cursor.isAiming) {
                            ctx.beginPath(); ctx.arc(cursor.x, cursor.y, 40, 0, Math.PI * 2);
                            ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 4; ctx.stroke();
                        }
                        ctx.globalAlpha = 1.0;
                    } catch(e) {}
                }
            }
            requestAnimationFrame(drawGame);
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                gameTimeLeft--; totalTimeSpent++;
                let mins = Math.floor(gameTimeLeft / 60).toString().padStart(2, '0');
                let secs = (gameTimeLeft % 60).toString().padStart(2, '0');
                uiTimer.innerText = `${mins}:${secs}`;
                if (gameTimeLeft <= 0) endGame(false);
            }, 1000);
        }

        function endGame(isClear) {
            gameState = 'GAMEOVER';
            clearInterval(timerInterval);
            gameOverScreen.classList.remove('hidden');

            // ปิดเพลงฉากเล่น และเปิดเสียงตอนจบ
            bgm.pause();
            if (isClear) { playSFX(sfxVictory); } else { playSFX(sfxGameOver); }

            const titleEl = document.getElementById('summary-title');
            const subEl = document.getElementById('summary-sub');

            if (isClear) {
                titleEl.innerText = "ALL CLEAR! 🎉";
                subEl.innerText = "ชนะระดับเทพ! แก๊งมอนสเตอร์ยอมแพ้แล้ว!";
                gameOverScreen.style.backgroundImage = "url('images/bg-victory.png')";
            } else {
                titleEl.innerText = "TIME'S UP ⏳";
                subEl.innerText = "หมดเวลา! แพ้แบบขำๆ ลองใหม่นะ";
                gameOverScreen.style.backgroundImage = "url('images/bg-gameover.png')";
            }

            document.getElementById('summary-score').innerText = `${score}`;
            let finalMins = Math.floor(totalTimeSpent / 60).toString().padStart(2, '0');
            let finalSecs = (totalTimeSpent % 60).toString().padStart(2, '0');
            document.getElementById('summary-time').innerText = `${finalMins}:${finalSecs} นาที`;
        }

        btnStart.addEventListener('click', () => {
            // ระบบเสียงจะทำงานได้หลังผู้ใช้กดปุ่มแล้ว
            bgm.currentTime = 0;
            bgm.play().catch(e => console.log(e));

            startScreen.classList.add('hidden');
            gameState = 'PLAYING'; score = 0; totalTimeSpent = 0; uiScore.innerText = score;
            questionsList = generateMathQuestions(); loadQuestion(0); startTimer();
        });

        btnRestart.addEventListener('click', () => {
            sfxVictory.pause();
            sfxGameOver.pause();
            bgm.currentTime = 0;
            bgm.play().catch(e => console.log(e));

            gameOverScreen.classList.add('hidden');
            gameState = 'PLAYING'; score = 0; totalTimeSpent = 0; uiScore.innerText = score;
            questionsList = generateMathQuestions(); loadQuestion(0); startTimer();
        });

        btnFullscreen.addEventListener('click', () => {
            const doc = window.document;
            const docEl = doc.documentElement;
            const requestFullScreen = docEl.requestFullscreen || docEl.webkitRequestFullscreen || docEl.mozRequestFullScreen || docEl.msRequestFullscreen;
            const cancelFullScreen = doc.exitFullscreen || doc.webkitExitFullscreen || doc.mozCancelFullScreen || doc.msExitFullscreen;

            if (!doc.fullscreenElement && !doc.webkitFullscreenElement && !doc.mozFullScreenElement && !doc.msFullscreenElement) {
                if (requestFullScreen) {
                    requestFullScreen.call(docEl).catch(err => {
                        showToast("เบราว์เซอร์ของคุณจำกัดการขยายจออัตโนมัติ");
                    });
                } else {
                    showToast("ระบบ iOS (iPhone/iPad) ไม่รองรับปุ่มนี้ แนะนำให้หมุนจอเอาครับ 📱");
                }
            } else {
                if (cancelFullScreen) {
                    cancelFullScreen.call(doc);
                }
            }
        });

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'absolute top-20 left-1/2 transform -translate-x-1/2 bg-black/90 text-white px-4 py-3 sm:px-6 sm:py-4 rounded-2xl z-[100] font-bold text-center border-2 border-yellow-400 shadow-[0_0_15px_rgba(250,204,21,0.5)] transition-opacity duration-500 text-xs sm:text-sm w-[85%] max-w-md';
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => document.body.removeChild(toast), 500);
            }, 4000);
        }

        let currentStream = null;

        window.addEventListener('beforeunload', () => {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
        });

        async function initCamera() {
            statusText.innerText = "กำลังขออนุญาตเปิดกล้อง... (กรุณากด Allow)";
            
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" } 
                });
                videoElement.srcObject = currentStream;
                
                await new Promise((resolve) => {
                    videoElement.onloadedmetadata = () => { videoElement.play().then(resolve); };
                });

                isWebcamActive = true;
                statusText.innerText = "เปิดกล้องสำเร็จ! กำลังโหลด AI วิเคราะห์มือ...";

                const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
                hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
                
                await hands.initialize();
                
                hands.onResults((results) => {
                    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                        isHandDetected = true; 
                        statusText.innerText = "เชื่อมต่อระบบ AR Hand Tracking เรียบร้อย 🖐️";
                        
                        const lm = results.multiHandLandmarks[0];
                        const indexTip = { x: (1 - lm[8].x) * canvasElement.width, y: lm[8].y * canvasElement.height };
                        const wrist = { x: (1 - lm[0].x) * canvasElement.width, y: lm[0].y * canvasElement.height };
                        const middleTip = { x: (1 - lm[12].x) * canvasElement.width, y: lm[12].y * canvasElement.height };
                        
                        cursor.x = indexTip.x; 
                        cursor.y = indexTip.y;
                        
                        const distToMidTip = Math.sqrt(Math.pow(middleTip.x - wrist.x, 2) + Math.pow(middleTip.y - wrist.y, 2));
                        // เงื่อนไขการกำมือ
                        const isFist = distToMidTip < (canvasElement.height * 0.25);

                        if (isFist && !cursor.wasFist) {
                            playSFX(sfxLock); // เล่นเสียงล็อกเป้า
                            cursor.isAiming = true; cursor.wasFist = true;
                        } else if (!isFist && cursor.wasFist) {
                            cursor.isAiming = false; cursor.wasFist = false; shootStick(cursor); 
                        }
                    } else {
                        if (isHandDetected) {
                            isHandDetected = false; cursor.isAiming = false; cursor.wasFist = false;
                            statusText.innerText = "กำลังหามือของคุณ... (ใช้เมาส์คลิกเพื่อเล่นแทนได้)";
                        }
                    }
                });

                let lastVideoTime = -1;
                async function processVideoFrame() {
                    if (videoElement.readyState >= 2 && videoElement.currentTime !== lastVideoTime) {
                        lastVideoTime = videoElement.currentTime;
                        try { await hands.send({ image: videoElement }); } catch (err) {}
                    }
                    requestAnimationFrame(processVideoFrame);
                }
                processVideoFrame();

            } catch(e) {
                console.error("Camera Init Error:", e);
                isWebcamActive = false; isHandDetected = false;
                statusText.innerText = "🎮 โหมดปกติ: เข้าถึงกล้องไม่ได้ (ใช้เมาส์แทน)";
            }
        }

        initCamera();
        requestAnimationFrame(drawGame);
    </script>
</body>
</html>
